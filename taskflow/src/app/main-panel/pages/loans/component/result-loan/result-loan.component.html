<mat-card class="m-3 mt-5" *ngIf="result">
  <mat-card-header>
    <mat-card-title class="text-azul text-bold text-md">
      Resultado da Simulação
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p><strong>Parcela Mensal:</strong> R$ {{ result.monthlyInstallment | number:'1.2-2' }}</p>
    <p><strong>Total Pago:</strong> R$ {{ result.totalPayment | number:'1.2-2' }}</p>
    <p><strong>Total de Juros:</strong> R$ {{ result.totalInterest | number:'1.2-2' }}</p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button 
    class="btn btn-azul m-5" 
    routerLink="/emprestimo">
      Voltar
    </button>
  </mat-card-actions>
</mat-card>
