<aside class="sidebar">
    @for (item of menuItems; track item.label) {
      <div class="menu-item"
           [routerLink]="item.link"
           routerLinkActive="active"
          >
        <mat-icon class="mr-3" aria-hidden="true">{{item.icon}}</mat-icon>
        {{item.label | translate }}
      </div>
    }
</aside>
