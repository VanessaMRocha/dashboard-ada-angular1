<header class="header">
  <div class="logo-area">
    <img src="logo_caixa.png" alt="Logo da empresa" class="logo-img" />
  </div>

  @if (isAuthenticated()) {
    <div class="user-area">
      <span class="welcome-text">Bem vindo, {{ username }}!</span>
      <button mat-icon-button class="logout-btn" (click)="logout()">
        <mat-icon aria-hidden="true" fontIcon="logout"></mat-icon>
      </button>
    </div>
  }
</header>
