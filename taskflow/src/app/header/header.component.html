<header class="header">
  <div>Logo</div>

  <div *ngIf="username" class="d-flex align-items-center">
    <span class="me-3">Bem vindo, {{ username }}!</span>
    <button mat-icon-button class="text-white">
      <mat-icon
        aria-hidden="false"
        aria-label="Ícone do botão de sair"
        fontIcon="logout"
        (click) = "efetuarLogout()"
      ></mat-icon>
    </button>
  </div>
</header>
